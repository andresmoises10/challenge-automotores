version: '3.9'

services:
  # ============================================
  # PostgreSQL 16
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: automotores-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-automotores_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automotores-network

  # ============================================
  # Backend (NestJS)
  # ============================================
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: automotores-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3030
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-automotores_db}
    ports:
      - "3030:3030"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend/src:/app/src
      - backend_modules:/app/node_modules
    networks:
      - automotores-network

  # ============================================
  # Frontend (Angular)
  # ============================================
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: automotores-frontend
    environment:
      API_TARGET: http://backend:3030
    ports:
      - "4200:4200"
    depends_on:
      - backend
    volumes:
      - ./apps/frontend/src:/app/src
      - frontend_modules:/app/node_modules
    networks:
      - automotores-network

networks:
  automotores-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  backend_modules:
    driver: local
  frontend_modules:
    driver: local
