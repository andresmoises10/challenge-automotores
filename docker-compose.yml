version: '3.9'

services:
  # ============================================
  # PostgreSQL 16
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: automotores-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-automotores_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automotores-network

  # ============================================
  # pgAdmin 4
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: automotores-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - automotores-network

  # ============================================
  # Backend (NestJS 10)
  # ============================================
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: automotores-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-automotores_db}
      API_PORT: 3030
      API_URL: http://localhost:3030
    ports:
      - "3030:3030"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend/src:/app/src
      - ./apps/backend/node_modules:/app/node_modules
    command: npm run start:dev
    networks:
      - automotores-network

  # ============================================
  # Frontend (Angular 20)
  # ============================================
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: automotores-frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      ANGULAR_API_URL: ${ANGULAR_API_URL:-http://localhost:3030/api}
    ports:
      - "4200:4200"
    depends_on:
      - backend
    volumes:
      - ./apps/frontend/src:/app/src
      - ./apps/frontend/node_modules:/app/node_modules
    command: npm start
    networks:
      - automotores-network

networks:
  automotores-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local